# spec/effects.canonical.yaml — single source of truth for AIL effect surface
#
# RFC: docs/proposals/effect-conformance.md (D7 doctrine, cycle 10)
# Author: Tekton, 2026-05-14
#
# Schema:
#   name:        canonical effect name (scope.action)
#   tier:        core | substrate
#   signature:   AIL type signature
#   determinism: replayable | replayable_with_seed | ledger | approval_record | external
#   side_effect: none | state_write | state_delete | schedule_register | subprogram_launch |
#                log_emit | network_io | fs_write | external_input | external_io
#   capabilities: [Text]  — capability tokens for `with context allow_effects`
#   since:        AIL version that introduced this effect
#
# Runtime contract:
#   - All three runtimes (Python / Go / Rust) MUST register every `tier: core` effect
#     and pass the conformance corpus (Phase 2+).
#   - `tier: substrate` effects: Python is reference. Go/Rust expose signature as
#     `NotImplementedHost` stub (Phase 4).
#   - Boot fails if an effect dispatched at runtime is not present in this file.

# ============================================================================
# CORE — 12 entries / 6 scopes (shipped-truth, Telos review 2026-05-14)
#
# Phase 0 의도: yaml은 *현 executor가 실제 dispatch하는* effect 표면만 박는다.
# Planned effect (log.*, clock.epoch_ms, file.delete/exists, gh.run 등)는
# RFC §5 Phase 로드맵 자리이고 yaml entry는 *land된 turn*에 같이 추가된다.
# ============================================================================

