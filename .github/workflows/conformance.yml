name: conformance

# Run the same .ail corpus through every available runtime and compare
# stdout to the expected output declared in each program's header.
# Divergence between runtimes is the loudest spec-ambiguity signal we have
# — let CI shout about it on every push.

on:
  push:
    branches: [main, dev, tekton]
    paths:
      - 'tests/conformance/**'
      - 'rust-impl/examples/**'
      - 'rust-impl/**'
      - 'go-impl/**'
      - 'reference-impl/**'
      - '.github/workflows/conformance.yml'
  pull_request:
    paths:
      - 'tests/conformance/**'
      - 'rust-impl/examples/**'
      - 'rust-impl/**'
      - 'go-impl/**'
      - 'reference-impl/**'
      - '.github/workflows/conformance.yml'

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-impl
      - run: cd rust-impl && cargo build --release --bin ail-rs
      - name: rust-impl/examples (inline format)
        run: bash tests/conformance/run.sh rust
      - name: reference-impl cases (sidecar format)
        run: bash tests/conformance/run.sh rust reference-impl/tests/conformance/cases

  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: cd go-impl && go build -o ail-go .
      - name: rust-impl/examples (inline format)
        run: bash tests/conformance/run.sh go
      - name: reference-impl cases (sidecar format)
        run: bash tests/conformance/run.sh go reference-impl/tests/conformance/cases

  python:
    name: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cd reference-impl && pip install -e .
      - name: rust-impl/examples (inline format)
        run: bash tests/conformance/run.sh python
      - name: reference-impl cases (sidecar format)
        run: bash tests/conformance/run.sh python reference-impl/tests/conformance/cases
