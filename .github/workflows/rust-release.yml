name: rust-release

# Two trigger modes:
# 1. Tag push `rust-v*.*.*` (distinct from PyPI's `v*.*.*`) — builds
#    binaries AND publishes a public GitHub Release. Used for shipping.
# 2. Manual workflow_dispatch — builds binaries only, uploads as Actions
#    artifacts (downloadable from the run page). Used for field-testing
#    a dev build before approving a real release tag.
#
# The `release` job below is gated on `refs/tags/` so dispatch runs
# never publish a public release accidentally.

on:
  push:
    tags:
      - 'rust-v*.*.*'
  workflow_dispatch:
    inputs:
      label:
        description: "Free-form label for the build (e.g. dev-baecd4f). Tagged in artifact names."
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          # x86_64-apple-darwin built via cross-compile from macos-latest
          # (Apple Silicon). macos-13 native runner queue has been unreliable
          # (>20min waits in practice). Cross-build matches the rust.yml
          # field-build flow so dev artifacts and release artifacts share
          # build provenance.
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
    defaults:
      run:
        working-directory: rust-impl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-impl
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ail-rs
      - name: Stage artifact (binary + examples)
        run: |
          set -eu
          BIN="ail-rs${{ matrix.ext }}"
          OUT_DIR="../dist"
          STAGE="../dist/_stage"
          mkdir -p "${OUT_DIR}" "${STAGE}"
          cp "target/${{ matrix.target }}/release/${BIN}" "${STAGE}/"
          cp -r examples "${STAGE}/examples"
          # Version label: tag name on tag push, dispatch input on manual run.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            LABEL="${{ github.event.inputs.label }}-$(echo ${GITHUB_SHA} | cut -c1-7)"
          else
            LABEL="${GITHUB_REF_NAME}"
          fi
          ARCHIVE="ail-rs-${LABEL}-${{ matrix.target }}.tar.gz"
          (cd "${STAGE}" && tar -czf "../${ARCHIVE}" "${BIN}" examples)
          rm -rf "${STAGE}"
          (cd "${OUT_DIR}" && ls -la)
      - uses: actions/upload-artifact@v4
        with:
          name: ail-rs-${{ matrix.target }}
          path: dist/ail-rs-*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a public release when triggered by a tag.
    # workflow_dispatch runs stop after `build` — artifacts are downloadable
    # from the Actions run page for field-testing.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NUM="${VERSION#rust-v}"
          {
            echo "# ${VERSION}"
            echo
            echo "Single-binary AIL runtime (Rust). Subset matches go-impl/ Phase-0 — fn / entry / intent declarations / arithmetic / comparisons / membership / Result / attempt cascade / ~25 builtins. \`intent\` execution requires an adapter (not bundled in v0)."
            echo
            echo "## Install"
            echo
            echo '```'
            echo "tar -xzf ail-rs-${VERSION}-<target>.tar.gz"
            echo "./ail-rs run program.ail"
            echo '```'
            echo
            echo "## Targets"
            for f in dist/*.tar.gz; do
              echo "- $(basename "$f")"
            done
          } > release-notes.md
          cat release-notes.md
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
